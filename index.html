<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Parkhaus Finder Basel</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />


  </head>


<body>

  <!-- Hintergrund -->
  <div class="overlay"></div>


<!-- HEADER -->
<header class="header">

  <div class="logo">
    <i class="fa-solid fa-location-dot"></i>
    <h1>Parkhaus-Finder-<span>Basel</span></h1>
  </div>

  <!-- Navigation -->
  <nav class="nav-buttons" id="navMenu">

    <a href="stadtplan.html" class="nav-btn">Stadtplan</a>
    <a href="index.html" class="nav-btn">Parkingfinder</a>
    <a href="ueber_uns.html" class="nav-btn">Über uns</a>

  </nav>

  <!-- Timer -->
  <div class="topbar">
    <div>Parkhaussuche</div>
    <div id="date">--.--.--</div>
    <div id="clock">--:--:--</div>
  </div>

  <!-- Hamburger -->
  <button class="hamburger" id="hamburger">
    <i class="fa-solid fa-bars"></i>
  </button>

</header>
  


  <!-- MAIN -->
  
  <main>

    
    <!-- KACHELN -->
    <section class="parking-grid" id="parkingGrid"></section>

    <!-- TOP 5 -->
    <section class="top-section">

      <h2>Top 5 Parkhäuser für Sie:</h2>

      <table>

        <thead>
          <tr>
            <th>Parkhäuser</th>
            <th>Plätze frei</th>
            <th>Routenplaner</th>
          </tr>
        </thead>

        <tbody id="topTable"></tbody>

      </table>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>
  <a href="impressum.html">Impressum</a>
  </footer>

  <!-- JAVASCRIPT -->
  <script src="js/kacheln.js" type="module"></script>


<script>
const hamburger = document.getElementById("hamburger");
const navMenu = document.getElementById("navMenu");

hamburger.addEventListener("click", () => {
  navMenu.classList.toggle("active");
});
</script>


<script>
   function updateClock() {
      const now = new Date();

      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");

      const d = String(now.getDate()).padStart(2, "0");
      const mo = String(now.getMonth() + 1).padStart(2, "0");
      const y = String(now.getFullYear()).slice(2);

      document.getElementById("clock").textContent = `${h}:${m}:${s}`;
      document.getElementById("date").textContent = `${d}.${mo}.${y}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>




</body>
</html>
