<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Parkhaus Finder Basel</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <div class="overlay"></div>

  <header class="header">
    <div class="logo">
      <i class="fa-solid fa-location-dot"></i>
      <h1>Parkhaus-Finder-<span>Basel</span></h1>
    </div>

    <button class="hamburger" id="hamburger">
      <i class="fa-solid fa-bars"></i>
    </button>

    <nav class="nav-buttons" id="navMenu">
      <a href="stadtplan.html" class="nav-btn">Stadtplan</a>
      <a href="index.html" class="nav-btn">Parkingfinder</a>
      <a href="ueber_uns.html" class="nav-btn">Über uns</a>
    </nav>
  </header>

  <div class="topbar">
    <div>Parkhaussuche</div>
    <div id="date">--.--.--</div>
    <div id="clock">--:--:--</div>
  </div>

  <section class="map-page">

    <div class="legend">
      <div class="legend-item">
        <i class="fa-solid fa-location-dot green"></i>
        <div>
          <p>&lt;50%</p>
          <p>kleine</p>
          <p>Parkhausbelegung</p>
        </div>
      </div>

      <div class="legend-item">
        <i class="fa-solid fa-location-dot orange"></i>
        <div>
          <p>&gt;50% / &lt;75%</p>
          <p>mittlere</p>
          <p>Parkhausbelegung</p>
        </div>
      </div>

      <div class="legend-item">
        <i class="fa-solid fa-location-dot red"></i>
        <div>
          <p>&gt;75%</p>
          <p>grosse</p>
          <p>Parkhausbelegung</p>
        </div>
      </div>
    </div>

    <div class="map-container">
      <div id="map"></div>
    </div>
  </section>

  <footer>
    <a href="impressum.html">Impressum</a>
  </footer>

  <script>
    function updateClock() {
      const now = new Date();

      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = String(now.getFullYear()).slice(2);

      const clockEl = document.getElementById("clock");
      const dateEl = document.getElementById("date");

      // Sicherheitscheck, damit nichts abstürzt
      if (clockEl) clockEl.textContent = `${hours}:${minutes}:${seconds}`;
      if (dateEl) dateEl.textContent = `${day}.${month}.${year}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

  <script>
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");

    if (hamburger && navMenu) {
      hamburger.addEventListener("click", () => {
        navMenu.classList.toggle("active");
      });
    }
  </script>

  <script src="js/stadtplan.js" type="module"></script>

</body>
</html>
